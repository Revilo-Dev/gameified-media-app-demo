mutation CreateUser @auth(level: USER) {
  user_insert(data: {
    id: "00000000-0000-0000-0000-000000000000",
    username: "newuser",
    email: "user@example.com",
    level: 1,
    totalXP: 0
  })
}

mutation UpdateUser($data: User_Data!) @auth(level: USER) {
  user_update(key: {id_expr: "auth.uid"}, data: $data)
}

mutation DeleteUser @auth(level: USER) {
  user_delete(key: {id_expr: "auth.uid"})
}

query GetUser @auth(level: USER) {
  user(key: {id_expr: "auth.uid"}) {
    username email level totalXP
  }
}

query ListUsers @auth(level: PUBLIC, insecureReason: "Public leaderboards are required for the game.") {
  users(orderBy: [{totalXP: DESC}], limit: 50) {
    username totalXP
  }
}

mutation CreatePost($contentText: String!, $imageUrl: String) @auth(level: USER) {
  post_insert(data: {
    author: {id_expr: "auth.uid"},
    contentText: $contentText,
    imageUrl: $imageUrl,
    createdAt: "2023-10-27T10:00:00Z"
  })
}

mutation UpdatePost($id: UUID!, $contentText: String) @auth(level: USER) {
  post_update(key: {id: $id}, data: {contentText: $contentText})
}

mutation DeletePost($id: UUID!) @auth(level: USER) {
  post_delete(key: {id: $id})
}

query GetPost($id: UUID!) @auth(level: PUBLIC, insecureReason: "Posts are intended to be public.") {
  post(id: $id) {
    contentText imageUrl createdAt author { username }
  }
}

query ListPosts @auth(level: PUBLIC, insecureReason: "Public feed is required for the app.") {
  posts(orderBy: [{createdAt: DESC}], limit: 20) {
    contentText author { username }
  }
}

mutation CreateQuest($postId: UUID!, $title: String!, $description: String!, $xpReward: Int!) @auth(level: USER) {
  quest_insert(data: {
    post: {id: $postId},
    title: $title,
    description: $description,
    xpReward: $xpReward
  })
}

mutation UpdateQuest($id: UUID!, $xpReward: Int!) @auth(level: USER) {
  quest_update(key: {id: $id}, data: {xpReward: $xpReward})
}

mutation DeleteQuest($id: UUID!) @auth(level: USER) {
  quest_delete(key: {id: $id})
}

query GetQuest($id: UUID!) @auth(level: PUBLIC, insecureReason: "Quests are public information.") {
  quest(id: $id) {
    title description xpReward difficultyLevel
  }
}

query ListQuests @auth(level: PUBLIC, insecureReason: "Quest list is public.") {
  quests(limit: 50) {
    title xpReward
  }
}

mutation EarnAchievement($badgeName: String!) @auth(level: USER) {
  achievement_insert(data: {
    user: {id_expr: "auth.uid"},
    badgeName: $badgeName,
    earnedAt: "2023-10-27T10:00:00Z"
  })
}

mutation DeleteAchievement($id: UUID!) @auth(level: USER) {
  achievement_delete(key: {id: $id})
}

mutation UpdateAchievement($id: UUID!, $badgeName: String!) @auth(level: USER) {
  achievement_update(key: {id: $id}, data: {badgeName: $badgeName})
}

query GetAchievement($id: UUID!) @auth(level: USER) {
  achievement(key: {id: $id}) {
    badgeName earnedAt user { username }
  }
}

query ListMyAchievements @auth(level: USER) {
  achievements(where: {userId: {eq_expr: "auth.uid"}}) {
    badgeName earnedAt
  }
}

mutation FollowUser($followedId: UUID!) @auth(level: USER) {
  follow_insert(data: {
    follower: {id_expr: "auth.uid"},
    followed: {id: $followedId},
    createdAt: "2023-10-27T10:00:00Z"
  })
}

mutation UnfollowUser($followedId: UUID!) @auth(level: USER) {
  follow_delete(key: {followerId_expr: "auth.uid", followedId: $followedId})
}

query GetFollowers @auth(level: USER) {
  follows(where: {followedId: {eq_expr: "auth.uid"}}) {
    follower { username }
  }
}

query ListFollowing @auth(level: USER) {
  follows(where: {followerId: {eq_expr: "auth.uid"}}) {
    followed { username }
  }
}

mutation CreateInteraction($postId: UUID!, $type: String!) @auth(level: USER) {
  interaction_insert(data: {
    user: {id_expr: "auth.uid"},
    post: {id: $postId},
    interactionType: $type
  })
}

mutation DeleteInteraction($id: UUID!) @auth(level: USER) {
  interaction_delete(key: {id: $id})
}

query ListInteractionsForPost($postId: UUID!) @auth(level: PUBLIC, insecureReason: "Interaction counts are public.") {
  interactions(where: {postId: {eq: $postId}}) {
    interactionType user { username }
  }
}

query GetInteraction($id: UUID!) @auth(level: USER) {
  interaction(key: {id: $id}) {
    interactionType post { contentText }
  }
}